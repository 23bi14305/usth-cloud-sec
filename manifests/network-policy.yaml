apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: db-allow-only-web
  namespace: default
spec:
  podSelector:
    matchLabels:
      app: dvwa-db
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: dvwa-web
    ports:
    - protocol: TCP
      port: 3306
